<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 변경 — 스카이라이프 영업점 CRM</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Malgun Gothic','맑은 고딕',sans-serif;
  min-height:100vh;
  background:#eef0f4;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.card{
  background:#fff;
  border-radius:12px;
  box-shadow:0 8px 32px rgba(13,43,107,.10);
  width:100%;max-width:380px;
  padding:36px 32px 32px;
}
.brand{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px}
.brand .badge{background:#e8382c;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.04em}
.brand .name{font-size:15px;font-weight:700;color:#0d2b6b}
.subtitle{text-align:center;font-size:12px;color:#6b7280;margin-bottom:20px}
.me-badge{text-align:center;font-size:12px;color:#0d2b6b;font-weight:600;margin-bottom:20px;background:#f0f4ff;border-radius:6px;padding:8px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:#6b7280;margin-bottom:5px;letter-spacing:.02em;text-transform:uppercase}
.field input{
  width:100%;padding:11px 12px;font-size:14px;
  border:1px solid #cdd2df;border-radius:6px;
  outline:none;transition:border-color .15s,box-shadow .15s;
  background:#fff;color:#1a1a2e;
}
.field input:focus{border-color:#0d2b6b;box-shadow:0 0 0 3px rgba(13,43,107,.10)}
.btn-primary{
  width:100%;padding:12px;margin-top:6px;
  background:#0d2b6b;color:#fff;border:none;border-radius:6px;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:background .15s;
}
.btn-primary:hover{background:#0a2257}
.btn-primary:disabled{background:#9ca3af;cursor:not-allowed}
.btn-link{
  display:block;width:100%;text-align:center;margin-top:14px;
  background:none;border:none;color:#0d2b6b;font-size:12px;
  cursor:pointer;text-decoration:underline;
}
.error-box{
  background:#fee2e2;color:#991b1b;font-size:12px;
  padding:10px 12px;border-radius:6px;margin-bottom:16px;
  display:none;align-items:center;gap:6px;
}
.error-box.show{display:flex}
.success-box{
  background:#d1fae5;color:#065f46;font-size:12px;
  padding:10px 12px;border-radius:6px;margin-bottom:16px;
  display:none;align-items:center;gap:6px;
}
.success-box.show{display:flex}
.spinner{
  width:14px;height:14px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;
  display:inline-block;vertical-align:-2px;margin-right:6px;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;font-size:10px;color:#c1c5d0;margin-top:24px}
.hidden{display:none !important}
.access-denied{text-align:center;padding:32px 0}
.access-denied p{font-size:13px;color:#6b7280;margin-top:8px}
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <span class="badge">SKYLIFE</span>
    <span class="name">영업점 CRM</span>
  </div>
  <p class="subtitle">비밀번호 변경</p>

  <div id="denied-view" class="hidden">
    <div class="access-denied">
      <p style="font-size:15px;font-weight:700;color:#0d2b6b">로그인이 필요합니다</p>
      <p>로그인 후 다시 시도해주세요.</p>
      <button class="btn-primary" style="margin-top:16px" onclick="location.href='index.html'">로그인 화면으로</button>
    </div>
  </div>

  <div id="main-view" class="hidden">
    <div class="me-badge" id="me-badge"></div>
    <div class="error-box" id="pw-error"><span>⚠</span><span id="pw-error-msg"></span></div>
    <div class="success-box" id="pw-success"><span>✓</span><span>비밀번호가 변경되었습니다.</span></div>

    <div class="field">
      <label>새 비밀번호</label>
      <input type="password" id="new-password" placeholder="8자 이상 입력" autocomplete="new-password">
    </div>
    <div class="field">
      <label>새 비밀번호 확인</label>
      <input type="password" id="new-password-confirm" placeholder="다시 입력" autocomplete="new-password">
    </div>
    <button class="btn-primary" id="pw-btn" onclick="handleChangePassword()">비밀번호 변경하기</button>
    <button class="btn-link" onclick="handleGoBack()">이전 화면으로</button>
  </div>

  <div class="footer">© 이에스통신 · 내부 업무용 시스템</div>
</div>

<script>
const SUPABASE_URL = 'https://znmfpvyhnmenbvfxzbip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_jAPWVI1eqLBAruHKsOIcmg_FvtF6Kc5';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

var currentUserRole = null;

function showError(msg){
  document.getElementById('pw-error-msg').textContent = msg;
  document.getElementById('pw-error').classList.add('show');
  document.getElementById('pw-success').classList.remove('show');
}
function hideError(){
  document.getElementById('pw-error').classList.remove('show');
}
function setBtnLoading(loading){
  var btn = document.getElementById('pw-btn');
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>처리 중...' : '비밀번호 변경하기';
}

function handleGoBack(){
  if(currentUserRole==='admin' || currentUserRole==='staff'){
    location.href = 'crm.html';
  } else {
    location.href = 'crm.html';
  }
}

async function handleChangePassword(){
  hideError();
  var pw1 = document.getElementById('new-password').value;
  var pw2 = document.getElementById('new-password-confirm').value;

  if(pw1.length < 8){ showError('비밀번호는 8자 이상이어야 합니다.'); return; }
  if(pw1 !== pw2){ showError('비밀번호가 서로 일치하지 않습니다.'); return; }

  setBtnLoading(true);

  const { error } = await sb.auth.updateUser({ password: pw1 });

  if(error){
    setBtnLoading(false);
    showError('비밀번호 변경에 실패했습니다: ' + error.message);
    return;
  }

  // 비밀번호 변경 성공 시 must_change_password 플래그를 항상 false로 내림
  // (최초로그인/관리자초기화로 강제변경 상태였다면 이걸로 해제됨)
  const { data:{ user } } = await sb.auth.getUser();
  if(user){
    await sb.from('users').update({ must_change_password: false }).eq('id', user.id);
  }

  setBtnLoading(false);

  document.getElementById('pw-success').classList.add('show');
  document.getElementById('new-password').value = '';
  document.getElementById('new-password-confirm').value = '';
}

(async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){
    document.getElementById('denied-view').classList.remove('hidden');
    return;
  }

  const { data: me, error } = await sb.from('users').select('name, role, status').eq('id', session.user.id).single();

  if(error || !me || me.status !== 'active'){
    document.getElementById('denied-view').classList.remove('hidden');
    return;
  }

  currentUserRole = me.role;
  document.getElementById('me-badge').textContent = me.name + ' 님의 계정 비밀번호를 변경합니다.';
  document.getElementById('main-view').classList.remove('hidden');
})();

document.getElementById('new-password-confirm').addEventListener('keydown', function(e){ if(e.key==='Enter') handleChangePassword(); });
</script>
</body>
</html>
