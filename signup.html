<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 — 스카이라이프 영업점 CRM</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Malgun Gothic','맑은 고딕',sans-serif;
  min-height:100vh;
  background:#eef0f4;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.card{
  background:#fff;
  border-radius:12px;
  box-shadow:0 8px 32px rgba(13,43,107,.10);
  width:100%;max-width:420px;
  padding:36px 32px 32px;
}
.brand{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px}
.brand .badge{background:#e8382c;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.04em}
.brand .name{font-size:15px;font-weight:700;color:#0d2b6b}
.subtitle{text-align:center;font-size:12px;color:#6b7280;margin-bottom:26px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:#6b7280;margin-bottom:5px;letter-spacing:.02em;text-transform:uppercase}
.field label .req{color:#e8382c;margin-left:2px}
.field input,.field select{
  width:100%;padding:11px 12px;font-size:14px;
  border:1px solid #cdd2df;border-radius:6px;
  outline:none;transition:border-color .15s,box-shadow .15s;
  background:#fff;color:#1a1a2e;
}
.field input:focus,.field select:focus{border-color:#0d2b6b;box-shadow:0 0 0 3px rgba(13,43,107,.10)}
.field .hint-text{font-size:11px;color:#9ca3af;margin-top:4px}
.role-toggle{display:flex;gap:8px;margin-bottom:16px}
.role-btn{
  flex:1;padding:10px;border:1px solid #cdd2df;border-radius:6px;
  background:#fff;color:#6b7280;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;text-align:center;
}
.role-btn.active{background:#0d2b6b;color:#fff;border-color:#0d2b6b}
.btn-primary{
  width:100%;padding:12px;margin-top:6px;
  background:#0d2b6b;color:#fff;border:none;border-radius:6px;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:background .15s;
}
.btn-primary:hover{background:#0a2257}
.btn-primary:disabled{background:#9ca3af;cursor:not-allowed}
.btn-link{
  display:block;width:100%;text-align:center;margin-top:14px;
  background:none;border:none;color:#0d2b6b;font-size:12px;
  cursor:pointer;text-decoration:underline;
}
.error-box{
  background:#fee2e2;color:#991b1b;font-size:12px;
  padding:10px 12px;border-radius:6px;margin-bottom:16px;
  display:none;align-items:center;gap:6px;
}
.error-box.show{display:flex}
.hidden{display:none !important}
.spinner{
  width:14px;height:14px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;
  display:inline-block;vertical-align:-2px;margin-right:6px;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* 가입완료 안내 */
.done-icon{width:48px;height:48px;border-radius:50%;background:#fef3c7;color:#92400e;font-size:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.done-title{text-align:center;font-size:15px;font-weight:700;color:#0d2b6b;margin-bottom:8px}
.done-desc{text-align:center;font-size:12px;color:#6b7280;line-height:1.6;margin-bottom:20px}
.footer{text-align:center;font-size:10px;color:#c1c5d0;margin-top:24px}
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <span class="badge">SKYLIFE</span>
    <span class="name">영업점 CRM</span>
  </div>
  <p class="subtitle">회원가입 신청</p>

  <!-- 가입 폼 -->
  <div id="signup-view">
    <div class="error-box" id="signup-error"><span>⚠</span><span id="signup-error-msg"></span></div>

    <div class="field">
      <label>소속 <span class="req">*</span></label>
      <select id="branch-select" onchange="handleBranchSelectChange()">
        <option value="">선택해주세요</option>
      </select>
      <p class="hint-text">"이에스"는 내부직원(영업팀/접수팀), 그 외는 영업점입니다.</p>
    </div>

    <div class="field">
      <label class="hint-checkbox" style="display:flex;align-items:center;gap:6px;text-transform:none;font-weight:600;font-size:12px;color:#374151;cursor:pointer">
        <input type="checkbox" id="new-branch-check" onchange="toggleNewBranchInput()" style="width:15px;height:15px;cursor:pointer">
        목록에 내 영업점이 없어요 (신규 등록)
      </label>
    </div>

    <div class="field hidden" id="new-branch-field">
      <label>신규 영업점명 <span class="req">*</span></label>
      <input type="text" id="new-branch-name" placeholder="예: 새영업점">
    </div>

    <div class="field">
      <label>이름 <span class="req">*</span></label>
      <input type="text" id="signup-name" placeholder="실명 입력" autocomplete="name">
    </div>
    <div class="field">
      <label>아이디 <span class="req">*</span></label>
      <input type="text" id="signup-username" placeholder="영문/숫자 조합" autocomplete="username">
    </div>
    <div class="field">
      <label>비밀번호 <span class="req">*</span></label>
      <input type="password" id="signup-password" placeholder="8자 이상" autocomplete="new-password">
    </div>
    <div class="field">
      <label>비밀번호 확인 <span class="req">*</span></label>
      <input type="password" id="signup-password-confirm" placeholder="다시 입력" autocomplete="new-password">
    </div>

    <button class="btn-primary" id="signup-btn" onclick="handleSignup()">가입 신청하기</button>
    <button class="btn-link" onclick="location.href='index.html'">이미 계정이 있으신가요? 로그인</button>
  </div>

  <!-- 가입완료(승인대기) 안내 -->
  <div id="done-view" class="hidden">
    <div class="done-icon">⏳</div>
    <p class="done-title">가입 신청이 접수되었습니다</p>
    <p class="done-desc">관리자 또는 담당 직원의 승인이 완료되면<br>바로 로그인해서 사용하실 수 있습니다.</p>
    <button class="btn-primary" onclick="location.href='index.html'">로그인 화면으로</button>
  </div>

  <div class="footer">© 이에스통신 · 내부 업무용 시스템</div>
</div>

<script>
const SUPABASE_URL = 'https://znmfpvyhnmenbvfxzbip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_jAPWVI1eqLBAruHKsOIcmg_FvtF6Kc5';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
const INTERNAL_DOMAIN = '@escrm-internal.com';
const INTERNAL_STAFF_LABEL = '이에스'; // 이 값을 고르면 내부직원으로 처리

let branchOptions = []; // Supabase branches 테이블에서 불러온 목록

async function loadBranchOptions(){
  const sel = document.getElementById('branch-select');
  const { data: branches, error } = await sb.from('branches').select('id, branch_name').order('branch_name');

  if(error){
    showError('영업점 목록을 불러오지 못했습니다: ' + error.message);
    return;
  }

  branchOptions = branches || [];

  // "이에스"(내부직원)가 목록에 없으면 맨 앞에 표시용으로 추가 (실제 branches 테이블엔 안 넣음)
  let html = '<option value="">선택해주세요</option>';
  html += '<option value="__staff__">' + INTERNAL_STAFF_LABEL + ' (내부직원)</option>';
  branchOptions.forEach(function(b){
    html += '<option value="' + b.id + '">' + b.branch_name + '</option>';
  });
  sel.innerHTML = html;
}

function handleBranchSelectChange(){
  // 드롭다운에서 선택하면 신규등록 체크는 자동 해제
  document.getElementById('new-branch-check').checked = false;
  document.getElementById('new-branch-field').classList.add('hidden');
}

function toggleNewBranchInput(){
  const checked = document.getElementById('new-branch-check').checked;
  document.getElementById('new-branch-field').classList.toggle('hidden', !checked);
  const sel = document.getElementById('branch-select');
  if(checked){
    sel.value = '';
    sel.disabled = true;
  } else {
    sel.disabled = false;
  }
}

function showError(msg){
  document.getElementById('signup-error-msg').textContent = msg;
  document.getElementById('signup-error').classList.add('show');
}
function hideError(){
  document.getElementById('signup-error').classList.remove('show');
}
function setBtnLoading(btn, loading, label){
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>처리 중...' : label;
}

async function handleSignup(){
  hideError();

  const name = document.getElementById('signup-name').value.trim();
  const username = document.getElementById('signup-username').value.trim();
  const pw1 = document.getElementById('signup-password').value;
  const pw2 = document.getElementById('signup-password-confirm').value;
  const isNewBranch = document.getElementById('new-branch-check').checked;
  const branchSelectVal = document.getElementById('branch-select').value;
  const newBranchName = document.getElementById('new-branch-name').value.trim();

  if(!name || !username || !pw1 || !pw2){
    showError('모든 필수 항목을 입력해주세요.');
    return;
  }
  if(!/^[a-zA-Z0-9]{3,20}$/.test(username)){
    showError('아이디는 영문/숫자 3~20자로 입력해주세요.');
    return;
  }
  if(pw1.length < 8){
    showError('비밀번호는 8자 이상이어야 합니다.');
    return;
  }
  if(pw1 !== pw2){
    showError('비밀번호가 서로 일치하지 않습니다.');
    return;
  }
  if(isNewBranch){
    if(!newBranchName){
      showError('신규 영업점명을 입력해주세요.');
      return;
    }
  } else {
    if(!branchSelectVal){
      showError('소속을 선택해주세요.');
      return;
    }
  }

  // 최종 requested_role / requested_branch_name 결정
  let requestedRole, requestedBranchName;
  if(isNewBranch){
    requestedRole = 'branch';
    requestedBranchName = newBranchName;
  } else if(branchSelectVal === '__staff__'){
    requestedRole = 'staff';
    requestedBranchName = null;
  } else {
    requestedRole = 'branch';
    const matched = branchOptions.find(function(b){ return b.id === branchSelectVal; });
    requestedBranchName = matched ? matched.branch_name : null;
  }

  const btn = document.getElementById('signup-btn');
  setBtnLoading(btn, true, '가입 신청하기');

  const email = username + INTERNAL_DOMAIN;

  // 1) Supabase Auth 계정 생성
  const { data, error } = await sb.auth.signUp({ email, password: pw1 });

  if(error){
    setBtnLoading(btn, false, '가입 신청하기');
    if(error.message && error.message.toLowerCase().includes('already')){
      showError('이미 사용 중인 아이디입니다.');
    } else {
      showError('가입 처리 중 오류가 발생했습니다: ' + error.message);
    }
    return;
  }

  if(!data.user){
    setBtnLoading(btn, false, '가입 신청하기');
    showError('가입 처리 중 오류가 발생했습니다. 다시 시도해주세요.');
    return;
  }

  // 2) public.users에 승인대기 상태로 내 정보 등록
  const { error: insertErr } = await sb.from('users').insert({
    id: data.user.id,
    name: name,
    role: null,
    status: 'pending',
    requested_role: requestedRole,
    requested_branch_name: requestedBranchName,
    login_id: username
  });

  setBtnLoading(btn, false, '가입 신청하기');

  if(insertErr){
    showError('계정 정보 저장에 실패했습니다: ' + insertErr.message);
    return;
  }

  // 가입 직후 자동 로그인 세션이 생기므로, 승인 전까지는 로그아웃 상태로 되돌림
  await sb.auth.signOut();

  document.getElementById('signup-view').classList.add('hidden');
  document.getElementById('done-view').classList.remove('hidden');
}

// Enter로 제출
['signup-name','signup-username','signup-password','signup-password-confirm','new-branch-name'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown', e=>{ if(e.key==='Enter') handleSignup(); });
});

loadBranchOptions();
</script>
</body>
</html>
