<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영업점 관리 — 스카이라이프 영업점 CRM</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#eef0f4;min-height:100vh;padding:24px}
.wrap{max-width:720px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.header h1{font-size:18px;color:#0d2b6b;font-weight:700}
.header .nav a{font-size:12px;color:#0d2b6b;text-decoration:underline;margin-left:12px}
.card{background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(13,43,107,.08);padding:20px;margin-bottom:16px}
.card h2{font-size:14px;color:#0d2b6b;margin-bottom:12px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:#6b7280;font-size:11px;text-transform:uppercase;padding:6px 8px;border-bottom:1px solid #e5e7eb}
td{padding:8px;border-bottom:1px solid #f1f2f6}
td input{width:100%;padding:6px 8px;border:1px solid #cdd2df;border-radius:4px;font-size:13px;outline:none}
td input:focus{border-color:#0d2b6b}
.btn{padding:6px 12px;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer}
.btn-save{background:#0d2b6b;color:#fff}
.btn-save:hover{background:#0a2257}
.btn-del{background:#fee2e2;color:#991b1b;margin-left:4px}
.btn-del:hover{background:#fecaca}
.add-row{display:flex;gap:8px;margin-top:12px}
.add-row input{flex:1;padding:8px 10px;border:1px solid #cdd2df;border-radius:5px;font-size:13px}
.add-row button{background:#0d2b6b;color:#fff;border:none;border-radius:5px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.hidden{display:none !important}
.denied{text-align:center;padding:60px 0}
.denied p{color:#6b7280;font-size:13px;margin-top:8px}
.empty{text-align:center;color:#9ca3af;font-size:12px;padding:20px 0}
.hint{font-size:11px;color:#9ca3af;margin-top:8px}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1>영업점 관리</h1>
    <div class="nav">
      <a href="crm.html">접수 페이지로</a>
      <a href="approve.html">승인 관리로</a>
    </div>
  </div>

  <div id="denied-view" class="card hidden">
    <div class="denied">
      <p style="font-size:15px;font-weight:700;color:#0d2b6b">접근 권한이 없습니다</p>
      <p>영업점 관리는 관리자/내부직원만 이용 가능합니다.</p>
    </div>
  </div>

  <div id="main-view" class="hidden">
    <div class="card">
      <h2>등록된 영업점 (코드 · 이름)</h2>
      <table>
        <thead><tr><th style="width:90px">코드</th><th>영업점명</th><th style="width:130px"></th></tr></thead>
        <tbody id="branch-tbody"></tbody>
      </table>
      <div id="empty-branches" class="empty hidden">등록된 영업점이 없습니다.</div>
    </div>

    <div class="card">
      <h2>신규 영업점 직접 추가</h2>
      <div class="add-row">
        <input type="text" id="new-code" placeholder="코드 (본사 유치팀 코드, 예: 279)">
        <input type="text" id="new-name" placeholder="영업점명">
        <button onclick="addBranch()">추가</button>
      </div>
      <p class="hint">보통은 회원가입 승인 화면에서 자동으로 등록되니, 여기는 코드/이름을 나중에 고치거나 미리 등록해둘 때만 쓰면 됩니다.</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://znmfpvyhnmenbvfxzbip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_jAPWVI1eqLBAruHKsOIcmg_FvtF6Kc5';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ location.href='index.html'; return; }

  const { data: me, error } = await sb.from('users')
    .select('id, name, role, status').eq('id', session.user.id).single();

  if(error || !me || me.status !== 'active' || !['admin','staff'].includes(me.role)){
    document.getElementById('denied-view').classList.remove('hidden');
    return;
  }

  document.getElementById('main-view').classList.remove('hidden');
  await loadBranches();
}

async function loadBranches(){
  const { data, error } = await sb.from('branches').select('*').order('branch_code');
  const tbody = document.getElementById('branch-tbody');
  const emptyEl = document.getElementById('empty-branches');

  if(error){
    tbody.innerHTML = '';
    showToast('목록을 불러오지 못했습니다: '+error.message);
    return;
  }
  if(!data || data.length===0){
    tbody.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');

  tbody.innerHTML = data.map(function(b){
    return '<tr>' +
      '<td><input type="text" id="code-'+b.id+'" value="'+(b.branch_code||'').replace(/"/g,'&quot;')+'"></td>' +
      '<td><input type="text" id="name-'+b.id+'" value="'+(b.branch_name||'').replace(/"/g,'&quot;')+'"></td>' +
      '<td>' +
        '<button class="btn btn-save" onclick="saveBranch(\''+b.id+'\')">저장</button>' +
        '<button class="btn btn-del" onclick="deleteBranch(\''+b.id+'\',\''+(b.branch_name||'').replace(/'/g,"\\\\'")+'\')">삭제</button>' +
      '</td>' +
    '</tr>';
  }).join('');
}

async function saveBranch(id){
  const code = document.getElementById('code-'+id).value.trim();
  const name = document.getElementById('name-'+id).value.trim();
  if(!code || !name){ showToast('코드와 이름을 모두 입력해주세요.'); return; }

  const { error } = await sb.from('branches').update({ branch_code: code, branch_name: name }).eq('id', id);
  if(error){ showToast('저장 실패: '+error.message); return; }
  showToast('저장되었습니다.');
}

async function deleteBranch(id, name){
  // 소속 계정/접수건이 있으면 FK 제약으로 인해 삭제가 거부됨 (의도된 안전장치)
  if(!confirm(name+' 영업점을 삭제할까요?\n소속된 직원 계정이나 접수 데이터가 남아있으면 삭제되지 않습니다.')) return;

  const { error } = await sb.from('branches').delete().eq('id', id);
  if(error){
    showToast('삭제할 수 없습니다 — 소속 계정/접수 데이터가 남아있습니다.');
    return;
  }
  showToast('삭제되었습니다.');
  await loadBranches();
}

async function addBranch(){
  const code = document.getElementById('new-code').value.trim();
  const name = document.getElementById('new-name').value.trim();
  if(!code || !name){ showToast('코드와 이름을 모두 입력해주세요.'); return; }

  const { error } = await sb.from('branches').insert({ branch_code: code, branch_name: name });
  if(error){ showToast('추가 실패: '+error.message); return; }

  document.getElementById('new-code').value = '';
  document.getElementById('new-name').value = '';
  showToast('영업점이 추가되었습니다.');
  await loadBranches();
}

init();
</script>
</body>
</html>
